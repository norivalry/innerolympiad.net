<!DOCTYPE html>
<!DOCTYPE html>
<html lang="sl">
<head>

<meta charset="UTF-8">
<title>Inner Olympiad</title>

<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#4facfe,#00f2fe);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:white;
padding:50px;
border-radius:14px;
box-shadow:0 12px 30px rgba(0,0,0,0.2);
text-align:center;
max-width:600px;
}

h1{
margin-top:0;
font-size:36px;
color:#333;
}

p{
font-size:18px;
color:#555;
line-height:1.6;
}

.button{
display:inline-block;
margin-top:25px;
padding:14px 28px;
background:#4facfe;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:bold;
transition:0.3s;
}

.button:hover{
background:#2f80ed;
}

.footer{
margin-top:25px;
font-size:14px;
color:#888;
}

</style>

</head>

<body>

<div class="card">

<h1>Inner Olympiad</h1>

<p>
Vabljen si, da se pridružiš eksperimentu osebne rasti.
</p>

<p>
Inner Olympiad je prostor za ljudi, ki želijo razvijati
disciplino, jasnost misli in notranjo moč.
</p>

<a class="button" href="#">Pridruži se</a>

<div class="footer">
Natural Growth Project
</div>

</div>

</body>
</html>
