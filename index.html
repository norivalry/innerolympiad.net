<!DOCTYPE html>
<html lang="sl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Inner Olympiad</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* HERO CARD */

.hero{
text-align:center;
max-width:700px;
}

/* TITLE */

h1{
font-size:46px;
margin-bottom:10px;
}

.subtitle{
color:#cbd5e1;
font-size:20px;
margin-bottom:40px;
}

/* TORCH */

.torch{
width:30px;
height:120px;
background:#444;
margin:0 auto;
border-radius:8px;
position:relative;
}

/* FLAME */

.flame{
position:absolute;
top:-60px;
left:50%;
transform:translateX(-50%);
width:40px;
height:60px;
background:radial-gradient(circle,#ffd54f,#ff6a00);
border-radius:50%;
animation:flicker 1.2s infinite;
}

/* ANIMATION */

@keyframes flicker{
0%{transform:translateX(-50%) scale(1)}
25%{transform:translateX(-50%) scale(1.1)}
50%{transform:translateX(-50%) scale(0.95)}
75%{transform:translateX(-50%) scale(1.05)}
100%{transform:translateX(-50%) scale(1)}
}

/* TEXT */

p{
font-size:18px;
color:#cbd5e1;
line-height:1.6;
margin-top:40px;
}

/* BUTTON */

.button{
display:inline-block;
margin-top:35px;
padding:14px 30px;
background:#f59e0b;
color:#111;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

.button:hover{
background:#fbbf24;
}

.footer{
margin-top:40px;
font-size:14px;
color:#94a3b8;
}

</style>

</head>

<body>

<div class="hero">

<h1>Inner Olympiad</h1>

<div class="subtitle">
Prižgi notranji plamen discipline
</div>

<div class="torch">
<div class="flame"></div>
</div>

<p>
Vsaka olimpijada se začne z ognjem.
</p>

<p>
Ta ni na stadionu — ampak v tebi.
</p>

<a class="button" href="#">
Pridruži se izzivu
</a>

<div class="footer">
Natural Growth Project
</div>

</div>

</body>
</html>
